name: Build and Inject Secrets

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build with Secret Injection
      # The secret is passed as an environment variable
      # IMPORTANT: You must add ASSET_HUB_BASE_URL to your Repository Secrets on GitHub
      run: npm run build
      env:
        ASSET_HUB_BASE_URL: ${{ secrets.ASSET_HUB_BASE_URL }}

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
